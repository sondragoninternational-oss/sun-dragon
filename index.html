<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Dragon System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  background: #111;
  color: white;
}

button:hover {
  background: gold;
  color: black;
}

#app {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Sun Dragon SPA</h1>

<div class="nav">
  <button onclick="loadPage('pages/page-01/index.html')">Page 1</button>
  <button onclick="loadPage('pages/page-02/index.html')">Page 2</button>
  <button onclick="loadPage('pages/page-03/index.html')">Page 3</button>
</div>

<div id="app">Loading...</div>

<script>
function loadPage(url){
  fetch(url)
    .then(res => res.text())
    .then(html => {
      const content = html.split("<body>")[1].split("</body>")[0];
      document.getElementById("app").innerHTML = content;
    });
}

loadPage('pages/page-01/index.html');
</script>

</body>
</html>
