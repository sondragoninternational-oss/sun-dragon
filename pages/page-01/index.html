<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Dragon Media</title>

<style>
body {
  margin: 0;
  background: url("../../assets/backgrounds/bg1.jpg") no-repeat center center fixed;
  background-size: cover;
  font-family: Arial;
  color: white;
}

.container {
  text-align: center;
  padding-top: 40px;
}

button {
  margin: 10px;
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: rgba(0,0,0,0.7);
  color: white;
}

button:hover {
  background: gold;
  color: black;
}

.viewer {
  margin-top: 20px;
}

img, video {
  max-width: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Sun Dragon Viewer</h1>

  <button onclick="showImage()">صور</button>
  <button onclick="showVideo()">فيديو</button>
  <button onclick="showQR()">QR</button>

  <div class="viewer" id="viewer"></div>
</div>

<script>
function showImage(){
  document.getElementById("viewer").innerHTML =
    '<img src="../../assets/images/sample.jpg">';
}

function showVideo(){
  document.getElementById("viewer").innerHTML =
    '<video controls src="../../assets/videos/sample.mp4"></video>';
}

function showQR(){
  document.getElementById("viewer").innerHTML =
    '<img src="../../assets/qr/sample.png">';
}
</script>

</body>
</html>
