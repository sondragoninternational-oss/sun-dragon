<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Dragon Page</title>

<style>
body {
  margin: 0;
  background: url("../../assets/backgrounds/bg1.jpg") no-repeat center center fixed;
  background-size: cover;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  backdrop-filter: blur(5px);
}

button {
  margin: 10px;
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: rgba(0,0,0,0.7);
  color: white;
  transition: 0.3s;
}

button:hover {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<div class="container">
  <button onclick="loadMedia('image')">عرض الصور</button>
  <button onclick="loadMedia('video')">عرض الفيديو</button>
  <button onclick="loadMedia('qr')">عرض QR</button>
</div>

<script>
function loadMedia(type){
  if(type === 'image'){
    alert("سيتم تحميل الصور من assets/images");
  } else if(type === 'video'){
    alert("سيتم تحميل الفيديو من assets/videos");
  } else if(type === 'qr'){
    alert("سيتم تحميل QR من assets/qr");
  }
}
</script>

</body>
</html>
