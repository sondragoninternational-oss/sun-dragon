<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Dragon Smart</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  transition: background 0.5s ease;
  background-size: cover;
  background-position: center;
}

.container {
  text-align: center;
  padding-top: 40px;
}

button {
  margin: 8px;
  padding: 12px 20px;
  font-size: 16px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: rgba(0,0,0,0.7);
  color: white;
}

button:hover {
  background: gold;
  color: black;
}

.viewer {
  margin-top: 20px;
}

img, video {
  max-width: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Sun Dragon Smart Viewer</h1>

  <button onclick="setBG('bg1.jpg')">BG 1</button>
  <button onclick="setBG('bg2.jpg')">BG 2</button>
  <button onclick="setBG('bg3.jpg')">BG 3</button>

  <br>

  <button onclick="showImage()">صور</button>
  <button onclick="showVideo()">فيديو</button>
  <button onclick="showQR()">QR</button>

  <div class="viewer" id="viewer"></div>
</div>

<script>
function setBG(bg){
  document.body.style.backgroundImage =
    "url('../../assets/backgrounds/" + bg + "')";
  localStorage.setItem("bg", bg);
}

function loadBG(){
  const saved = localStorage.getItem("bg");
  if(saved){
    document.body.style.backgroundImage =
      "url('../../assets/backgrounds/" + saved + "')";
  } else {
    setBG("bg1.jpg");
  }
}

function showImage(){
  document.getElementById("viewer").innerHTML =
    '<img src="../../assets/images/sample.jpg">';
}

function showVideo(){
  document.getElementById("viewer").innerHTML =
    '<video controls src="../../assets/videos/sample.mp4"></video>';
}

function showQR(){
  document.getElementById("viewer").innerHTML =
    '<img src="../../assets/qr/sample.png">';
}

loadBG();
</script>

</body>
</html>
